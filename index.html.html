// ══ HELPERS ════════════════════════════════════════════════════════
function px(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),w,h);}
function ol(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function MR(){return{x:M.x,y:M.y,w:M.w,h:M.h};}
function rr(x,y,w,h,r,f,s,sw){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
  if(f){ctx.fillStyle=f;ctx.fill();}if(s){ctx.strokeStyle=s;ctx.lineWidth=sw||1;ctx.stroke();}
}

// ══ PIXEL TEXT ═════════════════════════════════════════════════════
function pt(txt,x,y,sz,col,sh){
  ctx.save();ctx.textAlign='center';ctx.font=`bold ${sz}px monospace`;
  if(sh){ctx.fillStyle=sh;ctx.fillText(txt,x+1,y+1);}
  ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.restore();
}
function ptL(txt,x,y,sz,col){
  ctx.save();ctx.textAlign='left';ctx.font=`bold ${sz}px monospace`;
  ctx.fillStyle='#000';ctx.fillText(txt,x+1,y+1);
  ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.restore();
}
function ptR(txt,x,y,sz,col){
  ctx.save();ctx.textAlign='right';ctx.font=`bold ${sz}px monospace`;
  ctx.fillStyle='#000';ctx.fillText(txt,x+1,y+1);
  ctx.fillStyle=col;ctx.fillText(txt,x,y);ctx.restore();
}

// ══ DRAW BRICK BLOCK (sprite tile) ════════════════════════════
function drawBrick(sx,sy,w,h){
  const x=Math.round(sx),y=Math.round(sy);
  ctx.save(); ctx.imageSmoothingEnabled=false;
  // Tile the brick image
  const tw=20, th=20;
  for(let bx=0;bx<w;bx+=tw){
    for(let by=0;by<h;by+=th){
      const dw=Math.min(tw,w-bx), dh=Math.min(th,h-by);
      ctx.drawImage(BRICK_IMG,0,0,32,32,x+bx,y+by,dw,dh);
    }
  }
  ctx.restore();
}

// ══ DRAW Q BLOCK (20x20) ════════════════════════════════════════════
function drawQBlock(sx,sy,hit,bT){
  const x=Math.round(sx),yo=Math.round(sy-(bT>0?Math.sin(bT*0.4)*6:0));
  if(hit){
    px(x,yo,20,20,P.qD);px(x+1,yo+1,18,18,P.brickD);return;
  }
  px(x,yo,20,20,P.qY);
  px(x,yo,20,2,P.qD);px(x,yo+18,20,2,P.qD);
  px(x,yo,2,20,P.qD);px(x+18,yo,2,20,P.qD);
  px(x+2,yo+2,5,4,P.qL); // shine
  ctx.fillStyle=P.K;ctx.font='bold 12px monospace';ctx.textAlign='center';
  ctx.fillText('?',x+10,yo+15);
}

// ══ DRAW AERIAL BLOCK ════════════════════════════════════════════════
function drawABlock(ab,camX){
  if(ab.broken) return;
  const sx=ab.x-camX, sy=ab.y-(ab.bounceT>0?Math.sin(ab.bounceT*0.4)*5:0);
  if(sx<-24||sx>W+24) return;
  if(ab.isQ) drawQBlock(sx,sy,ab.hit,ab.bounceT);
  else{
    if(ab.hit&&ab.breakable) return; // broken brick disappears
    drawBrick(sx,sy,20,20);
  }
}

// ══ DRAW LAVA ════════════════════════════════════════════════════════
function drawLava(lx,ly,lw,t){
  const x=Math.round(lx),y=Math.round(ly);
  // Lava base
  px(x,y,lw,H-y,P.lava);
  // Wave top
  for(let i=0;i<lw;i+=4){
    const wave=Math.sin((i+t*3)*0.15)*4;
    px(x+i,y+wave,4,4,P.lava2);
  }
  // Bright spots
  for(let i=0;i<3;i++){
    const bx=x+Math.floor((t*2+i*lw/3)%lw);
    px(bx,y+Math.sin((bx+t)*0.2)*3,4,4,P.lava3);
  }
}

  // Hills parallax 0.5
  [0,300,680,1060,1460,1860,2260,2660,3060,3460].forEach((bx,i)=>{

  [160,440,780,1080,1440,1800,2200,2600,3000,3400].forEach((bx,i)=>{
    const sx=bx-camX*0.7;

  });
}

// ══ ALL SOLID BOXES ════════════════════════════════════════════════
function getSolids(){
  const s=[];
  // Ground strips (avoid lava)
  // We handle ground separately in physics
  // Platforms
  PLAT.forEach(b=>s.push({x:b.x,y:b.y,w:b.w,h:b.h}));
  // Pipes
  PIPES.forEach(pp=>s.push({x:pp.x,y:pp.y,w:PW,h:pp.h}));
  // Aerial blocks
  ABLOCKS.forEach(ab=>{
    if(!ab.broken&&!(ab.hit&&ab.breakable)) s.push({x:ab.x,y:ab.y,w:ab.w,h:ab.h,_ab:ab});
  });
  return s;
}

// ══ PHYSICS ════════════════════════════════════════════════════════
function update(){
  tick++;

  // Flower animation
  PIPES.forEach(pp=>{
    if(!pp.flower) return;
    pp.fy=(pp.fy||0)+pp.fd*0.6;
    if(pp.fy>=68) pp.fd=-1;
    if(pp.fy<=0) pp.fd=1;
  });

  // Bounce timers
  ABLOCKS.forEach(ab=>{if(ab.bounceT>0)ab.bounceT--;});

  // Mushroom physics
  MUSHROOMS=MUSHROOMS.filter(mu=>{
    if(!mu.alive) return false;
    mu.vy+=GRAV*0.55; mu.x+=mu.vx; mu.y+=mu.vy;
    if(mu.y+mu.h>=GY){mu.y=GY-mu.h;mu.vy=0;}
    if(ol(MR(),{x:mu.x,y:mu.y,w:mu.w,h:mu.h})){
      if(!M.big){M.big=true;M.w=36;M.h=48;M.y-=12;}
      return false;
    }
    return mu.y<H+60;
  });

  // Coin particles
  COINS=COINS.filter(c=>{c.vy-=0.5;c.y-=c.vy;c.t--;return c.t>0;});

  // Koopa shells
  SHELLS=SHELLS.filter(sh=>{
    sh.x+=sh.vx;
    // Kill goombas and koopas it touches
    GOOMBAS.forEach(g=>{
      if(g.alive&&!g.stomped&&ol({x:sh.x,y:sh.y,w:sh.w,h:sh.h},{x:g.x,y:g.y,w:g.w,h:g.h})){
        g.stomped=true;g.stompT=20;
      }
    });
    if(sh.x<-60||sh.x>WW+60) return false;
    return true;
  });

  if(M.dead||STATE!=='PLAYING'){return;}

  // Input
  if(keys.R){M.vx=SPD;M.dir=1;}
  else if(keys.L){M.vx=-SPD;M.dir=-1;}
  else M.vx*=0.72;

  M.vy+=GRAV;
  const prevY=M.y;
  M.x+=M.vx; M.y+=M.vy;
  if(M.x<0)M.x=0;
  if(M.x>WW-M.w)M.x=WW-M.w;

  M.grnd=false;

  // Ground collision (check lava pits)
  const inLava=LAVA.some(lv=>M.x+M.w>lv.x+4&&M.x<lv.x+lv.w-4);
  if(!inLava){
    if(M.y+M.h>=GY&&M.vy>=0){M.y=GY-M.h;M.vy=0;M.grnd=true;}
  } else if(M.y+M.h>=GY){
    hitMario(true); return; // lava = instant death
  }

  // Solid box collisions
  const solids=getSolids();
  solids.forEach(box=>{
    if(!ol(MR(),box)) return;
    const oT=M.y+M.h-box.y;
    const oB=box.y+box.h-M.y;
    const oL=M.x+M.w-box.x;
    const oR=box.x+box.w-M.x;
    const minH=Math.min(oL,oR);
    const minV=Math.min(oT,oB);
    if(minV<=minH){
      if(oT<oB){
        // Land on top
        M.y=box.y-M.h;M.vy=0;M.grnd=true;
      } else {
        // Hit from below
        M.y=box.y+box.h;
        const wasNeg=M.vy<0;
        M.vy=Math.abs(M.vy)*0.2;
        // Trigger block
        if(wasNeg&&box._ab){
          const ab=box._ab;
          if(!ab.hit){
            ab.hit=true;ab.bounceT=10;
            if(ab.isQ){
              const qi=ab.qIdx;
              // spawn mushroom or coin
              if(typeof qi!=='undefined'&&qi!==null){
                MUSHROOMS.push({x:ab.x,y:ab.y-22,w:20,h:20,vx:1.4,vy:-1,alive:true});
              } else {
                COINS.push({x:ab.x+10,y:ab.y-10,vy:6,t:38});
              }
            } else if(ab.breakable&&M.big){
              ab.broken=true;
              // Debris particles
              for(let i=0;i<4;i++) COINS.push({x:ab.x+5+i*3,y:ab.y,vy:5+i,t:25});
            } else if(!ab.breakable&&!ab.isQ){
              // Normal brick bounce
              COINS.push({x:ab.x+10,y:ab.y-10,vy:6,t:28});
            }
          }
        }
      }
    } else {
      if(oL<oR){M.x=box.x-M.w;M.vx=0;}
      else{M.x=box.x+box.w;M.vx=0;}
    }
  });

  // Goomba collisions
  GOOMBAS.forEach(g=>{
    if(!g.alive) return;
    if(g.stomped){g.stompT--;if(g.stompT<=0)g.alive=false;return;}
    g.x+=g.vx;
    if(g.x<=g.patrol.L){g.x=g.patrol.L;g.vx=Math.abs(g.vx);}
    if(g.x+g.w>=g.patrol.R){g.x=g.patrol.R-g.w;g.vx=-Math.abs(g.vx);}
    g.y=GY-g.h;
    if(ol(MR(),{x:g.x,y:g.y,w:g.w,h:g.h})){
      if(M.vy>0&&prevY+M.h<=g.y+8){
        g.stomped=true;g.stompT=24;M.vy=JUMP*0.45;
        goombaKilled++;currentQ=g.qi;
        STATE='QUESTION';qSel=-1;qAnswered=false;qBtns=[];
      } else { hitMario(false); }
    }
  });

  // Koopa collisions
  KOOPAS.forEach(k=>{
    if(!k.alive) return;
    if(k.shell){
      k.x+=k.shellVx;k.shellT--;
      if(k.shellT<=0)k.alive=false;
      // Design-only: the shell slides but no longer interacts with other creatures
      return;
    }
    k.x+=k.vx;
    if(k.x<=k.patrol.L){k.x=k.patrol.L;k.vx=Math.abs(k.vx);}
    if(k.x+k.w>=k.patrol.R){k.x=k.patrol.R-k.w;k.vx=-Math.abs(k.vx);}
    k.y=GY-k.h;
    if(ol(MR(),{x:k.x,y:k.y,w:k.w,h:k.h})){
      if(M.vy>0&&prevY+M.h<=k.y+10){
        // Kick into shell
        k.shell=true;k.shellVx=M.dir*5;k.shellT=180;M.vy=JUMP*0.45;
      } else { hitMario(false); }
    }
  });

  // Bob-omb update — walk on aerial blocks
  const BB_Y_MAP = BB_Y_MAP_FIXED;
  BOBOMBS.forEach((bb,bi)=>{
    if(!bb.alive)return;
    if(bb.stomped){bb.stompT--;if(bb.stompT<=0)bb.alive=false;return;}
    // Fixed aerial Y
    bb.y = BB_Y_MAP[bi] || GY-BBH;
    bb.x+=bb.vx;
    if(bb.x<=bb.patrol.L){bb.x=bb.patrol.L;bb.vx=Math.abs(bb.vx);}
    if(bb.x+bb.w>=bb.patrol.R){bb.x=bb.patrol.R-bb.w;bb.vx=-Math.abs(bb.vx);}
    if(ol(MR(),{x:bb.x,y:bb.y,w:bb.w,h:bb.h})){
      if(M.vy>0&&prevY+M.h<=bb.y+8){
        bb.stomped=true;bb.stompT=22;M.vy=JUMP*0.45;
      } else { hitMario(false); }
    }
  });

  // Flower hit
  PIPES.forEach(pp=>{
    if(!pp.flower||!pp.fy||pp.fy<18) return;
    const hy=pp.y-pp.fy;
    if(ol(MR(),{x:pp.x+14,y:hy-16,w:20,h:pp.fy+12})) hitMario(true);
  });

  // Void
  if(M.y>H+100) hitMario(true);

  // Win condition
  if(M.x>5380&&goombaKilled>=8){STATE='WIN';winT=0;}

  // Camera
  cam=Math.max(0,Math.min(WW-W,M.x-W/3));

  // Animation
  M.frT++;if(M.frT>6){M.frT=0;M.fr=(M.fr+1)%4;}
  if(M.invT>0) M.invT--;
}

function hitMario(instant){
  if(!instant&&M.big){M.big=false;M.w=28;M.h=36;M.y+=12;M.invT=100;return;}
  M.dead=true;M.vy=-10;STATE='DEAD';deadT=110;
}

// ══ RENDER ════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,W,H);

  if(STATE==='INTRO'){drawIntro();return;}

  drawBG(cam);
  drawGround(cam,tick);

  // Platforms
  PLAT.forEach(b=>{
    const sx=b.x-cam;if(sx<-b.w||sx>W)return;
    drawBrick(sx,b.y,b.w,b.h);
  });

  // Aerial blocks
  ABLOCKS.forEach(ab=>drawABlock(ab,cam));

  // Pipes
  PIPES.forEach(pp=>{
    const sx=pp.x-cam;if(sx<-60||sx>W+60)return;
    drawPipe(sx,pp.y,pp.h);
    if(pp.flower) drawFlower(sx,pp.y,pp.fy||0);
  });

  // Mushrooms
  MUSHROOMS.forEach(mu=>{
    const sx=mu.x-cam;if(sx>-24&&sx<W+24) drawMushroom(sx,mu.y);
  });

  // Coin particles
  COINS.forEach(c=>{
    const sx=c.x-cam;
    if(sx>-16&&sx<W+16){
      rr(sx-5,c.y-5,10,10,5,P.coin,P.coinD,1);
      px(sx-2,c.y-3,4,6,P.coinD);
    }
  });

  // Goombas
  GOOMBAS.forEach(g=>{
    if(!g.alive)return;
    const sx=g.x-cam;if(sx<-40||sx>W+40)return;
    drawGoomba(sx,g.y,g.stomped);
    if(!g.stomped){
      ctx.fillStyle='#fff';ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText('G'+(g.qi+1),sx+14,g.y-3);
    }
  });

  // Koopas
  KOOPAS.forEach(k=>{
    if(!k.alive)return;
    const sx=k.x-cam;if(sx<-40||sx>W+40)return;
    drawKoopa(sx,k.y,k.shell,k.shellVx>0?1:-1);
  });

  // Bob-ombs
  BOBOMBS.forEach(bb=>{
    if(!bb.alive)return;
    const sx=bb.x-cam;
    if(sx>-40&&sx<W+40) drawBobomb(sx,bb.y,bb.stomped);
  });

  // Flag + Castle
  drawSign(cam);
  drawFlagPole(cam);
  drawCastle(cam);

  // Mario (blink when invincible)
  if(!M.dead){
    if(M.invT===0||Math.floor(M.invT/5)%2===0)
      drawMario(M.x-cam,M.y,M.big,M.dir,M.fr);
  } else {
    drawMario(M.x-cam,M.y,false,M.dir,0);
  }

  drawMobileControls();
  drawHUD();

  if(STATE==='QUESTION') drawQuestion();
  if(STATE==='WIN') drawWin();
  if(STATE==='DEAD'){
    px(0,0,W,H,'rgba(0,0,0,0.65)');
    pt('¡GAME OVER!',W/2,H/2-8,24,'#e40000','#000');
    pt('Reiniciando...',W/2,H/2+20,13,'#fff','#000');
  }
}

// ══ QUESTION ═════════════════════════════════════════════════════
function drawQuestion(){
  px(0,0,W,H,'rgba(0,0,0,0.9)');
  rr(10,8,W-20,H-16,12,'#08083a','#fce400',3);
  const hg=ctx.createLinearGradient(0,8,0,48);
  hg.addColorStop(0,'#e40000');hg.addColorStop(1,'#8c0000');
  ctx.fillStyle=hg;
  ctx.beginPath();ctx.moveTo(22,8);ctx.lineTo(W-22,8);
  ctx.quadraticCurveTo(W-10,8,W-10,20);ctx.lineTo(W-10,48);
  ctx.lineTo(10,48);ctx.lineTo(10,20);ctx.quadraticCurveTo(10,8,22,8);
  ctx.closePath();ctx.fill();
  pt('🍄 PREGUNTA '+(currentQ+1)+' DE 8',W/2,34,13,P.coin,'#000');

  const q=QS[currentQ];
  const qls=q.q.split('\n');
  ctx.fillStyle='#c8e8ff';ctx.font='12px monospace';ctx.textAlign='center';
  qls.forEach((l,i)=>ctx.fillText(l,W/2,60+i*16));

  px(20,60+qls.length*16+4,W-40,1,'rgba(252,228,0,0.25)');

  const optY0=60+qls.length*16+14;
  const avail=H-16-optY0-36;
  const n=q.ops.length;
  const optL=q.ops.map(o=>o.split('\n'));
  const optH=optL.map(ls=>Math.max(32,ls.length*14+12));
  const totH=optH.reduce((a,b)=>a+b,0)+6*(n-1);
  const sc2=totH>avail?avail/totH:1;

  qBtns=[];let cy=optY0;
  q.ops.forEach((op,i)=>{
    const ls2=optL[i],bh=Math.floor(optH[i]*sc2),by=Math.floor(cy);
    const isOk=i===q.ok,isSel=qSel===i;
    let bg='#080830',brd='#2828aa';
    if(qAnswered){if(isOk){bg='#082010';brd='#20aa40';}else if(isSel){bg='#200808';brd='#aa2020';}}
    else if(isSel){bg='#180860';brd='#5830cc';}
    rr(18,by,W-36,bh,6,bg,brd,2);
    const pref=q.tipo==='mc'?String.fromCharCode(65+i)+') ':'';
    ctx.fillStyle='#fff';ctx.font='11px monospace';ctx.textAlign='center';
    const midY=by+Math.floor(bh/2)-Math.floor((ls2.length-1)*13/2);
    ls2.forEach((ol2,li)=>ctx.fillText((li===0?pref:'')+ol2,W/2,midY+li*13));
    qBtns.push({x:18,y:by,w:W-36,h:bh,i});
    cy+=bh+Math.floor(6*sc2);
  });

  if(qAnswered){
    const ok=qSel===q.ok,ry=Math.floor(cy)+8;
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillStyle=ok?'#44ff88':'#ff5555';
    ctx.fillText(ok?'✓ ¡Correcto!':'✗ Marcada como incorrecta.',W/2,ry);
    rr(W/2-70,ry+4,140,18,5,'rgba(252,228,0,0.9)',null);
    ctx.fillStyle='#000';ctx.font='bold 10px monospace';
    ctx.fillText('Toca para seguir avanzando',W/2,ry+17);
  }
}

// ══ WIN ════════════════════════════════════════════════════════════
function drawWin(){
  winT++;
  const fi=Math.min(1,(winT-15)/45);

  rr(10,8,W-20,300,12,'rgba(0,0,18,0.97)','#fce400',3);

  ctx.shadowBlur=0;
  ctx.fillStyle='#aaddff';ctx.font='11px monospace';ctx.textAlign='center';
  ctx.fillText('¡Aplastaste todos los Goombas!',W/2,68);
  px(26,78,W-52,1,'rgba(252,228,0,0.3)');
  ctx.fillStyle='#fff';ctx.font='11px monospace';
  ctx.fillText('Preguntas respondidas: '+totalAttempts,W/2,98);
  ctx.fillText('Errores: '+wrongAttempts,W/2,116);
  const pc2=totalAttempts>0?Math.round(((totalAttempts-wrongAttempts)/totalAttempts)*100):100;
  const col=pc2>=90?'#44ff44':pc2>=80?'#7ad9ff':pc2>=60?P.coin:'#ff4444';
  ctx.fillStyle=col;ctx.font='bold 24px monospace';ctx.textAlign='center';
  ctx.fillText('Precisión: '+pc2+'%',W/2,152);
  rr(26,162,W-52,16,4,'#1a1a50',null);
  rr(26,162,Math.max(6,(W-52)*(pc2/100)),16,4,col,null);
  ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;rr(26,162,W-52,16,4,null,'rgba(255,255,255,0.1)',1);
  const msg=pc2>=90?'¡Dominio total del tema!':pc2>=80?'¡Muy bien! Buen manejo del tema.':pc2>=60?'No está mal, ¡puedes mejorar!':'Repasa el contenido e inténtalo de nuevo.';
  ctx.fillStyle='#aaddff';ctx.font='10px monospace';ctx.textAlign='center';ctx.fillText(msg,W/2,194);
  const sv=Math.min(5,Math.floor((winT-40)/12));
  for(let s=0;s<sv;s++){ctx.fillStyle=P.coin;ctx.font='18px monospace';ctx.fillText('★',W/2-66+s*32,216);}
  ctx.globalAlpha=1;
  if(winT>85){
    const bg2=ctx.createLinearGradient(W/2-96,228,W/2+96,272);
    bg2.addColorStop(0,'#900');bg2.addColorStop(1,'#e40000');
    rr(W/2-100,226,200,46,10,null,'#fce400',2);
    ctx.fillStyle=bg2;ctx.fill();
    ctx.fillStyle='#fff';ctx.font='bold 14px monospace';ctx.textAlign='center';
    ctx.fillText('Jugar de nuevo',W/2,254);
  }
}

// ══ INTRO ════════════════════════════════════════════════════════
let introT=0;
function drawIntro(){
  introT++;
  // Background
  px(0,0,W,H,P.sky);
  drawBrick(0,GY,W,H-GY);
  drawCloud(30,40); drawCloud(260,55); drawCloud(380,35);
  drawHill(0,GY,70); drawHill(300,GY,55);
  drawBush(150,GY+4); drawBush(370,GY+4);

  // ONE static Mario on left
  drawMario(W/2-140, GY-36, false, 1, 0);

  // ONE static Goomba on right (not animated, not in loop)
  ctx.save(); ctx.imageSmoothingEnabled=false;
  ctx.drawImage(GOOMBA_IMG, W/2+60, GY-46, 40, 46);
  ctx.restore();

  // Title panel
  rr(12,12,W-24,90,12,'rgba(0,0,0,0.92)','#fce400',3);

  // Title
  ctx.shadowColor='rgba(255,80,0,0.6)'; ctx.shadowBlur=8;
  pt('SUPER ACCESIBILIDAD',W/2,46,14,P.coin,'#000');
  pt('RAZONABLE BROS',W/2,66,14,P.coin,'#000');
  ctx.shadowBlur=0;
  px(18,74,W-36,2,P.mR);

  // Subtitle
  ctx.fillStyle='#aaddff'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
  ctx.fillText('Juego educativo sobre accesibilidad',W/2,90);

  px(18,100,W-36,1,'rgba(252,228,0,0.3)');

  // Blue backing box behind the instructions, for readability (like the other games)
  rr(12,106,W-24,148,12,'rgba(10,20,60,0.94)','#4aa8ff',2);

  // Instructions — tight, consistent spacing, generous padding inside the box
  const lines=[
    {t:'🍄  Debes aplastar los 8 Goombas saltando', c:'#ffffff'},
    {t:'     encima para poder ganar el juego.', c:'#ffffff'},
    {t:'⬅️ ➡️  Flechas del teclado para moverte.', c:'#aaddff'},
    {t:'     En celular: botones ◀ ▶ ↑ en pantalla.', c:'#aaddff'},
    {t:'❔  Responder mal una pregunta afecta tu', c:'#ffdd99'},
    {t:'     precisión, pero puedes seguir jugando.', c:'#ffdd99'},
    {t:'☠  Si un intruso te toca, reinicias el nivel', c:'#ffcccc'},
    {t:'     y tu precisión vuelve a empezar en 0%.', c:'#ffcccc'},
  ];
  lines.forEach((l,i)=>{
    ctx.fillStyle=l.c; ctx.font='11px monospace'; ctx.textAlign='center';
    ctx.fillText(l.t,W/2,128+i*15);
  });

  // Start button
  const pulse=0.82+Math.sin(introT*0.08)*0.18;
  ctx.globalAlpha=pulse;
  const sbg=ctx.createLinearGradient(W/2-100,266,W/2+100,310);
  sbg.addColorStop(0,'#900'); sbg.addColorStop(1,'#e40000');
  rr(W/2-106,264,212,46,10,null,'#fce400',2);
  ctx.fillStyle=sbg; ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff'; ctx.font='bold 17px monospace'; ctx.textAlign='center';
  ctx.fillText('¡ JUGAR !',W/2,293);

  ctx.fillStyle='rgba(200,220,255,0.4)'; ctx.font='9px monospace';
  ctx.fillText('Toca / clic / ESPACIO para comenzar',W/2,318);
}

// ══ LOOP ════════════════════════════════════════════════════════
let lastTs=0;
function loop(ts){
  const dt=Math.min((ts-lastTs)/16.67,3);lastTs=ts;
  if(STATE==='PLAYING') update();
  if(STATE==='DEAD'){
    M.vy+=GRAV;M.y+=M.vy;deadT--;
    if(deadT<=0) doFullReset();
  }
  render();
  requestAnimationFrame(loop);
}

function doFullReset(){
  totalAttempts=0;wrongAttempts=0;
  resetMario();initLevel();
  STATE='PLAYING';
}

// ══ INPUT ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.L=true;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.R=true;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&canJump){
    e.preventDefault();canJump=false;
    if(STATE==='INTRO'){doFullReset();return;}
    if(STATE==='PLAYING'&&M.grnd&&!M.dead){M.vy=JUMP;M.grnd=false;}
  }
});
document.addEventListener('keyup',e=>{
  if(e.code==='ArrowLeft'||e.code==='KeyA') keys.L=false;
  if(e.code==='ArrowRight'||e.code==='KeyD') keys.R=false;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') canJump=true;
});

function handleTap(mx,my){
  if(STATE==='INTRO'){doFullReset();return;}
  if(STATE==='QUESTION'){
    if(!qAnswered){
      qBtns.forEach(b=>{
        if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h){
          qSel=b.i;qAnswered=true;
          totalAttempts++;
          if(b.i!==QS[currentQ].ok) wrongAttempts++;
        }
      });
    } else {
      // Both correct and incorrect answers let Mario continue — only precision is affected
      STATE='PLAYING';
    }
    return;
  }
  if(STATE==='WIN'&&winT>85&&mx>W/2-100&&mx<W/2+100&&my>226&&my<272){
    totalAttempts=0;wrongAttempts=0;STATE='INTRO';return;
  }
  if(STATE==='PLAYING'&&M.grnd&&!M.dead){M.vy=JUMP;M.grnd=false;}
}

let tSX=0, usingButtons=false;
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=C.getBoundingClientRect();
  usingButtons=false;
  Array.from(e.touches).forEach(t=>{
    const tx=(t.clientX-r.left)*(W/r.width);
    const ty=(t.clientY-r.top)*(H/r.height);
    // Mobile buttons
    if(ty>H-75){
      usingButtons=true;
      if(tx>=10&&tx<=70){mobileL=true;keys.L=true;}
      if(tx>=78&&tx<=138){mobileR=true;keys.R=true;}
      if(tx>=W-85&&tx<=W-10){mobileJump=true;if(M.grnd&&!M.dead&&STATE==='PLAYING'){M.vy=JUMP;M.grnd=false;}}
      return;
    }
    tSX=tx;
    handleTap(tx,ty);
  });
},{passive:false});;
C.addEventListener('touchmove',e=>{e.preventDefault();if(STATE!=='PLAYING'||usingButtons)return;const t=e.touches[0],r=C.getBoundingClientRect();const tx=(t.clientX-r.left)*(W/r.width);if(tx<tSX-22){keys.L=true;keys.R=false;}else if(tx>tSX+22){keys.R=true;keys.L=false;}else{keys.L=false;keys.R=false;}},{passive:false});
C.addEventListener('touchend',e=>{
  e.preventDefault();
  keys.L=false;keys.R=false;mobileL=false;mobileR=false;mobileJump=false;
  usingButtons=false;
},{passive:false});;
C.addEventListener('click',e=>{const r=C.getBoundingClientRect();handleTap((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));});

// ══ START ══════════════════════════════════════════════════════
initLevel();
requestAnimationFrame(loop);
</script>
